name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
        cache-dependency-path: ./backend/package-lock.json || ./backend/package.json
        
    - name: Install dependencies
      run: npm ci || npm install --legacy-peer-deps
      
    - name: Build TypeScript
      run: npm run build
  
    - name: Type Check (Lint)
      run: npx tsc --noEmit
